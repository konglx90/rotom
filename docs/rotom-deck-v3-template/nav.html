<!-- ============ NAV ============ -->
<div class="arrow l" id="prev">‹</div>
<div class="arrow r" id="next">›</div>
<div class="progress" id="progress"></div>
<div class="footer">
  <span id="curTitle">封面</span>
  <span class="hint"><kbd>←</kbd><kbd>→</kbd> · 空格 · 数字键 · <kbd>Esc</kbd> 目录</span>
  <span id="curNum">01 / {{TOTAL}}</span>
</div>

<script>
  (function(){
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    let cur = 0;
    const $ = id => document.getElementById(id);
    const progress = $('progress');
    const curTitle = $('curTitle');
    const curNum = $('curNum');

    function show(n){
      n = Math.max(0, Math.min(total-1, n));
      slides.forEach((s,i)=>s.classList.toggle('active', i===n));
      cur = n;
      const s = slides[n];
      curTitle.textContent = s.dataset.title || '';
      curNum.textContent = String(n+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
      progress.style.width = ((n+1)/total*100) + '%';
      try{ localStorage.setItem('rotom-deck-v3-cur', String(n)); }catch(e){}
    }
    function next(){ show(cur+1); }
    function prev(){ show(cur-1); }

    document.addEventListener('keydown', e=>{
      if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }
      else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
      else if(e.key==='Home'){ e.preventDefault(); show(0); }
      else if(e.key==='End'){ e.preventDefault(); show(total-1); }
      else if(e.key==='Escape'){ e.preventDefault(); show(0); }
      else if(/^[0-9]$/.test(e.key)){ const n=parseInt(e.key,10); if(n>=1&&n<=total) show(n-1); }
    });
    $('next').onclick = next;
    $('prev').onclick = prev;

    document.querySelectorAll('[data-goto]').forEach(a=>{
      a.onclick = e=>{ e.preventDefault(); show(parseInt(a.dataset.goto,10)-1); };
    });

    document.body.addEventListener('click', e=>{
      if(e.target.closest('a,button,code,kbd,pre,table,.arrow,.toc,.imgbox,.img-placeholder')) return;
      if(e.clientX > window.innerWidth * 0.6) next();
      else if(e.clientX < window.innerWidth * 0.4) prev();
    });

    try{
      const saved = parseInt(localStorage.getItem('rotom-deck-v3-cur')||'0',10);
      if(saved>=0&&saved<total) show(saved); else show(0);
    }catch(e){ show(0); }
  })();
</script>
</div>
</body>
</html>
